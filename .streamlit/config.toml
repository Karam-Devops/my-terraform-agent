# Streamlit theme + runtime config (PUI-1B v3.4: Firefly-inspired theme).
#
# This file controls Streamlit's default visual appearance across all
# pages. The palette is inspired by Firefly.ai's Inventory page:
# clean white content area, cool light-gray sidebar, mint/teal accent
# for primary actions, dark-navy text. Status colors (success/warning/
# error) follow Material Design conventions for muscle-memory familiarity.
#
# Why this lives in `.streamlit/config.toml` (not in code):
#   * Streamlit's theming engine only reads from this file (or env vars).
#     Setting theme colors in Python via `st.set_page_config(theme=...)`
#     is NOT supported.
#   * One canonical place; all pages inherit. No per-page theming drift.
#   * Cloud Run deploy includes it automatically (COPY . /app/ in
#     Dockerfile picks up the dotfile directory).
#
# Customization scope:
#   * `[theme]` controls page-wide colors + fonts.
#   * Per-component overrides (status pills, table row colors) require
#     CSS injection via st.markdown(unsafe_allow_html=True). Those
#     live in app/ui/ helpers (not yet -- planned for PUI-1B v3.5).
#
# Reload behavior: changes to this file require a full Streamlit
# server restart (Cloud Run revision rollout, or `streamlit run`
# re-launch in local dev). NOT picked up by hot-reload.

# PUI-1B v3.6 (Firefly dark): switched from light to dark base.
# Firefly's production Inventory page is dark-mode-only; matching it
# makes the demo "feel like Firefly" instantly. The accent (mint/teal
# #00C4A7) carries over unchanged -- the brand color was already
# chosen to read well on either background.
[theme]
# Tell Streamlit to start from the dark base. Affects defaults for
# widget chrome (sliders, file uploaders, code blocks) that we don't
# explicitly override below -- they pick up dark-mode-appropriate
# styling automatically.
base = "dark"

# Primary accent -- used for buttons, links, focused widget borders.
# Firefly's brand is in the teal/mint family; this is close to their
# "Codify" button color from public demos. Bright enough to draw the
# eye on either light OR dark canvas (we keep it identical across
# theme modes for brand consistency).
primaryColor = "#00C4A7"

# Main content background -- near-black with a hint of navy (matches
# Streamlit's `base = "dark"` default but pinned explicitly so future
# Streamlit upgrades can't drift it). Firefly's inventory canvas is
# very close to this tone -- pure black would feel oppressive; the
# slight navy tint reads as "designed" rather than "terminal."
backgroundColor = "#0E1117"

# Sidebar + expander + card background -- one elevation step lighter
# than backgroundColor. Provides subtle separation between sidebar/
# cards and the main canvas without harsh borders. Mirrors Firefly's
# left-nav being slightly lighter than the data area.
secondaryBackgroundColor = "#1A1F2C"

# Base text -- off-white (NOT pure white). Pure white on dark feels
# harsh and over-bright; a slight blue tint matches the navy bg
# undertone and reduces eye strain on long inventory scrolls.
textColor = "#E5E9F2"

# Sans-serif feels right for SaaS dashboards (not "documenty"
# serif, not "code-y" mono). Streamlit's default sans stack is
# system-ui + Helvetica + Arial fallback -- consistent across OSes.
font = "sans serif"

# Status colors are NOT directly settable in Streamlit's theme
# (the theme only has primaryColor as the single accent slot).
# We use these in custom st.markdown HTML for status pills:
#   * Success / Imported:   #00C853 (Material Design green)
#   * Warning / Quarantined: #FFA726 (Material Design orange)
#   * Error / Failed:       #EF5350 (Material Design red)
#   * Info:                 #29B6F6 (Material Design light blue)
# See app/ui/status_pill.py (planned in PUI-1B v3.5) for the
# helper that renders these.

[server]
# Streamlit's default behavior on Cloud Run: bind to $PORT, no auth
# (we use Cloud Run IAM allowlist instead). These are also overridden
# by the Dockerfile CMD's --server.* flags but documented here so
# operators reading config know where to look.
headless = true

[browser]
# Don't show the "open in browser" prompt -- Cloud Run is the only
# context this runs in production; the URL comes from the operator's
# proxy or the Cloud Run service URL, not stdout.
gatherUsageStats = false
