# GCP google_dns_managed_zone → AWS Route 53 zone.
#
# Pure declarative. Two source patterns are common:
#
#  Pattern A: explicit map (vanilla GCP module library)
#     managed_zones = { "deephealthos" = { dns_name = "...", visibility = "public" }, ... }
#
#  Pattern B: single zone declared as scalars (DH customer pattern)
#     managed_zone = "deephealthos"
#     domain       = "deephealthos.com."
#     recordsets   = [...]
#
# Pattern A is handled by the for_each iteration. Pattern B falls
# through to synthesize_when_empty, which builds a single-entry map
# from the scalar fields.
#
# Source shape per zone (Pattern A):
#   { "<zone_key>" = { name?, dns_name, visibility, description? } }
# Target shape per zone (both patterns):
#   { "<safe_zone_key>" = { dns_name, visibility, description } }

source_type:   google_dns_managed_zone
target_type:   aws_route53_zone
service_name:  route53-zone
confidence:    HIGH
description:   "GCP Cloud DNS managed zones → AWS Route 53 hosted zones."

inputs:
  zones:
    for_each:
      # Source key fallbacks in priority order. Four customer patterns
      # observed:
      #   * managed_zones / zones / dns_zones — vanilla map shape
      #     { "<zone_key>" = { dns_name, visibility, ... } }
      #   * cloud_dns_config — DH observability stack uses a list
      #     where each item has {name, domain, type, description, recordsets}
      #     The engine's shape: map handles list-of-dicts via the item's
      #     `name` field as the synthesized map key.
      source: [managed_zones, zones, dns_zones, cloud_dns_config]
      shape: map

      # SCALAR fallback (DH cloud-dns pattern). When none of the
      # collection sources yield a populated value, synthesize a
      # single-entry map using the top-level scalar fields.
      # `managed_zone` becomes the map key; item_inputs are evaluated
      # against the top-level source args (so `from: domain` reads
      # the scalar `domain` field).
      synthesize_when_empty:
        key_from: managed_zone

      item_inputs:
        # DNS name — strip trailing dot (GCP often includes it, AWS doesn't).
        dns_name:
          from: [dns_name, domain]
          transform: strip_suffix:.

        # Visibility — fallback to `type` for the cloud_dns_config
        # shape where the field is named `type` (values: "private" |
        # "public"). Lowercased so the module's for_each filter matches.
        visibility:
          from: [visibility, type]
          transform: lowercase
          default: public

        # Description — defaults to a marker string for operator clarity.
        description:
          from: description
          default: "Migrated from GCP DNS managed zone"

# No compliance defaults — Route 53 hosted zones have nothing to harden
# at the zone level (TLS happens at downstream resources like ALB).
