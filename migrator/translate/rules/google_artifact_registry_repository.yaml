# GCP Artifact Registry → AWS ECR.
#
# Pure declarative — no python_override. Demonstrates the `for_each`
# directive added to the rules schema on 2026-05-12. The `repositories`
# input iterates over the source's `repositories` map (or
# `repository_config` alias) and emits one entry per source repo into
# the AWS module's input map.
#
# This is the migration template for the other simple-iteration
# translators (acm, log_sink, route53, secrets, subnet) — same shape,
# different attribute mappings + enum maps.

source_type:   google_artifact_registry_repository
target_type:   aws_ecr_repository
service_name:  ecr-repository
confidence:    HIGH
description:   "GCP Artifact Registry → AWS ECR. Container + Helm + OCI registries."

inputs:
  # Iterate over the source's artifact-registry list/map and emit one
  # entry per source repo into the AWS ECR module's input map.
  #
  # Source shape varies by customer:
  #   * `repositories` — map keyed by repo id (vanilla GCP pattern)
  #   * `repository_config` — alias used by some module libraries
  #   * `artifact_registry_config` — list-of-dicts (DH customer pattern,
  #     each entry typically just `{ name = "..." }`)
  #
  # for_each.source accepts a fallback list — first non-empty match wins.
  # shape: map handles list-of-dicts when each item has a `name` field
  # (engine auto-synthesizes the map key from `name`).
  repositories:
    for_each:
      source: [repositories, repository_config, artifact_registry_config]
      shape:  map
      item_inputs:
        # Repository name — falls back to the map key when source has no `name` field.
        name:
          from: name
          default_from_key: true

        # Description — defaults to a marker string for operator clarity.
        description:
          from: description
          default: "Migrated from GCP Artifact Registry"

        # Hardening defaults — always on for ECR (cheap baseline; HIPAA
        # mandates anyway). Operator can override per repo if needed.
        scan_on_push:
          default: true
        image_mutability:
          default: IMMUTABLE

# Profile-driven attrs — applied as TOP-LEVEL module inputs (NOT
# per-repo). The ECR module's variables.tf accepts these as
# module-wide defaults; per-repo overrides happen via item attrs.
compliance_defaults:
  hipaa:
    kms_encryption: true
  pci:
    kms_encryption: true
  soc2:
    image_scan_required: true
